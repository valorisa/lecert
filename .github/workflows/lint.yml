name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  markdown:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "**/*.md"
          config: ".markdownlint.json"

  json:
    name: JSON Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          shopt -s globstar nullglob
          files=$(find . -name "*.json" -not -path "./vendor/*" -not -path "./.git/*")
          if [ -z "$files" ]; then
            echo "No JSON files found"
            exit 0
          fi
          echo "Checking JSON files:"
          fail=0
          for f in $files; do
            if python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "  OK: $f"
            else
              echo "  FAIL: $f"
              fail=1
            fi
          done
          exit $fail

  golangci:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
